services:
  db:
    image: postgres:16-alpine
    container_name: sibillacosm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sibillacosm
      POSTGRES_USER: sibilla
      POSTGRES_PASSWORD: sibilla
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibilla -d sibillacosm"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer:4.8.1
    container_name: sibillacosm-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    container_name: sibillacosm-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: sibillacosm-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin123; do sleep 2; done;
      mc mb --ignore-existing local/sibillacosm-media;
      mc anonymous set download local/sibillacosm-media;
      "

volumes:
  postgres_data:
  minio_data:
